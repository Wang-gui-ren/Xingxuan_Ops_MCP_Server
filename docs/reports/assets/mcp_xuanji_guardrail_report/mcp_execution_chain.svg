<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">自研 MCP 安全执行链</title>
  <desc id="desc">展示 MCP 工具从自然语言意图到 dry-run、审批、执行代理和审计记录的安全执行链路。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f7ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#1e344f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 30px "Microsoft YaHei", Arial, sans-serif; fill: #102033; }
      .subtitle { font: 500 16px "Microsoft YaHei", Arial, sans-serif; fill: #536172; }
      .box { fill: #ffffff; stroke: #c8d8ea; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .danger { fill: #fff7f7; stroke: #ff9a9a; stroke-width: 1.7; rx: 18; filter: url(#shadow); }
      .safe { fill: #f5fff8; stroke: #85d6a8; stroke-width: 1.7; rx: 18; filter: url(#shadow); }
      .label { font: 700 21px "Microsoft YaHei", Arial, sans-serif; fill: #14243a; }
      .text { font: 500 15px "Microsoft YaHei", Arial, sans-serif; fill: #526174; }
      .tiny { font: 500 13px "Microsoft YaHei", Arial, sans-serif; fill: #667386; }
      .line { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .deny { stroke: #dc2626; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .ok { stroke: #0f9f80; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="60" y="62" class="title">自研 MCP 运维 Server：确定性安全执行链</text>
  <text x="60" y="92" class="subtitle">不暴露任意 shell，所有写动作先计划、再审批、后受限执行，并写入审计链</text>

  <rect x="70" y="150" width="205" height="130" class="box"/>
  <text x="100" y="194" class="label">MCP Tool Call</text>
  <text x="100" y="228" class="text">结构化工具参数</text>
  <text x="100" y="254" class="tiny">tool_name / params / trace_id</text>

  <rect x="345" y="135" width="245" height="160" class="box"/>
  <text x="380" y="180" class="label">OperationContext</text>
  <text x="380" y="214" class="text">标准化命令、路径、目标</text>
  <text x="380" y="242" class="text">绑定 dry_run 与 approval_id</text>
  <text x="380" y="270" class="text">脱敏参数摘要</text>

  <rect x="660" y="115" width="260" height="200" class="danger"/>
  <text x="695" y="160" class="label">安全意图校验器</text>
  <text x="695" y="194" class="text">Prompt Injection</text>
  <text x="695" y="222" class="text">危险命令 / 敏感路径</text>
  <text x="695" y="250" class="text">权限、服务、网络策略风险</text>
  <text x="695" y="278" class="text">low / medium / high / critical</text>

  <rect x="1000" y="120" width="210" height="90" class="danger"/>
  <text x="1030" y="158" class="label">critical</text>
  <text x="1030" y="186" class="text">直接 deny</text>

  <rect x="1000" y="250" width="210" height="100" class="box"/>
  <text x="1030" y="288" class="label">high</text>
  <text x="1030" y="316" class="text">需要审批或仅 dry-run</text>

  <rect x="70" y="455" width="250" height="150" class="safe"/>
  <text x="100" y="500" class="label">dry-run 计划</text>
  <text x="100" y="534" class="text">固定模板预演</text>
  <text x="100" y="562" class="text">post_checks / rollback_hint</text>

  <rect x="390" y="455" width="250" height="150" class="box"/>
  <text x="420" y="500" class="label">审批账本</text>
  <text x="420" y="534" class="text">approval_id / scope_hash</text>
  <text x="420" y="562" class="text">grant / reject / revoke</text>

  <rect x="710" y="455" width="250" height="150" class="safe"/>
  <text x="740" y="500" class="label">受限执行代理</text>
  <text x="740" y="534" class="text">固定模板 + 受限身份</text>
  <text x="740" y="562" class="text">禁止自由 shell</text>

  <rect x="1030" y="455" width="180" height="150" class="box"/>
  <text x="1060" y="500" class="label">审计链</text>
  <text x="1060" y="534" class="text">JSONL</text>
  <text x="1060" y="562" class="text">prev/event hash</text>

  <path class="line" d="M275 215 C305 215 315 215 345 215"/>
  <path class="line" d="M590 215 C620 215 630 215 660 215"/>
  <path class="deny" d="M920 175 C950 165 970 160 1000 160"/>
  <path class="line" d="M920 270 C950 292 970 300 1000 300"/>
  <path class="ok" d="M790 315 C710 405 405 420 195 455"/>
  <path class="line" d="M320 530 C350 530 360 530 390 530"/>
  <path class="ok" d="M640 530 C670 530 680 530 710 530"/>
  <path class="line" d="M960 530 C990 530 1000 530 1030 530"/>
  <text x="650" y="678" class="tiny">核心策略：critical 永不由审批绕过；high 必须匹配审批范围；审计落盘是执行闭环的一部分。</text>
</svg>
